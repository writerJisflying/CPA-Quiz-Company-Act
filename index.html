<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會計師考試練習</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f5f0; --surface:#ffffff; --surface2:#f5f5f0;
    --text:#1a1a1a; --muted:#888888; --soft:#555555;
    --border:#e8e8e4; --border2:#e0e0d8; --line:#cccccc;
    --accent:#1a1a1a; --accent-text:#ffffff;
    --ok-bg:#e1f5ee; --ok-bd:#1d9e75; --ok-tx:#085041;
    --ng-bg:#fcebeb; --ng-bd:#e24b4a; --ng-tx:#791f1f;
    --tag-bg:#e6f1fb; --tag-tx:#0c447c;
    --tag2-bg:#e1f5ee; --tag2-tx:#085041;
    --tag3-bg:#faeeda; --tag3-tx:#633806;
    --link:#185fa5;
    --wrong-bd:#e0a0a0; --wrong-tx:#a32d2d;
  }
  [data-theme="dark"]{
    --bg:#15171a; --surface:#1f2227; --surface2:#272b31;
    --text:#e9eaec; --muted:#9aa0a8; --soft:#c2c6cc;
    --border:#33373e; --border2:#3a3f47; --line:#454b54;
    --accent:#e9eaec; --accent-text:#15171a;
    --ok-bg:#173a30; --ok-bd:#2fae84; --ok-tx:#7ee0c0;
    --ng-bg:#3d1f1f; --ng-bd:#e2706f; --ng-tx:#f4a8a7;
    --tag-bg:#16314a; --tag-tx:#8fc1ee;
    --tag2-bg:#163a30; --tag2-tx:#7ed8b8;
    --tag3-bg:#3d2f15; --tag3-tx:#e6c184;
    --link:#7ab3e8;
    --wrong-bd:#7a4444; --wrong-tx:#f0a0a0;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.2s,color 0.2s;-webkit-font-smoothing:antialiased}
  .app{max-width:480px;margin:0 auto;padding:1rem 1rem 3rem}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  h1{font-size:18px;font-weight:600;color:var(--text);margin-bottom:0.25rem}
  .subtitle{font-size:13px;color:var(--muted);margin-bottom:1rem}
  .theme-btn{flex-shrink:0;width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .theme-btn:active{transform:scale(0.92)}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
  .stat{background:var(--surface);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--border)}
  .stat-num{font-size:24px;font-weight:600}
  .stat-num.c{color:var(--ok-bd)}
  .stat-num.w{color:var(--ng-bd)}
  .stat-label{font-size:11px;color:var(--muted);margin-top:2px}
  .filter-bar{display:flex;gap:8px;margin-bottom:0.75rem;flex-wrap:wrap}
  .filter-btn{font-size:13px;padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:var(--surface);color:var(--soft);cursor:pointer;transition:all 0.15s;min-height:38px}
  .filter-btn.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
  .filter-btn:active{transform:scale(0.95)}
  .wrong-filter{border-color:var(--wrong-bd);color:var(--wrong-tx)}
  .wrong-filter.active{background:var(--ng-bd);color:#fff;border-color:var(--ng-bd)}
  .wrong-filter #wrong-count{font-weight:600}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
  .tag{display:inline-block;font-size:11px;padding:4px 10px;border-radius:20px;margin-bottom:12px;background:var(--tag-bg);color:var(--tag-tx);font-weight:500}
  .tag.證券{background:var(--tag2-bg);color:var(--tag2-tx)}
  .tag.商業{background:var(--tag3-bg);color:var(--tag3-tx)}
  .question{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:1rem}
  .options{display:flex;flex-direction:column;gap:10px}
  .opt{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.6;transition:background 0.12s;width:100%;min-height:48px}
  .opt:active:not(:disabled){transform:scale(0.99)}
  .opt.ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-tx)}
  .opt.ng{background:var(--ng-bg);border-color:var(--ng-bd);color:var(--ng-tx)}
  .opt.show-ans{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-tx)}
  .opt:disabled{cursor:default}
  .exp{margin-top:1rem;padding:12px 16px;background:var(--surface2);border-radius:12px;font-size:14px;color:var(--soft);line-height:1.7;display:none;border-left:3px solid var(--line)}
  .exp.show{display:block}
  .exp.ok-exp{border-left-color:var(--ok-bd)}
  .exp.ng-exp{border-left-color:var(--ng-bd)}
  .nav{display:flex;gap:10px;margin-top:0.75rem}
  .nav button{flex:1;padding:14px;font-size:15px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--text);cursor:pointer;transition:all 0.12s;font-weight:500;min-height:50px}
  .nav button.primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
  .nav button:disabled{opacity:0.3;cursor:default}
  .nav button:active:not(:disabled){transform:scale(0.97)}
  .prog{font-size:13px;color:var(--muted);text-align:right;margin-bottom:0.5rem}
  .done-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem 1.5rem;text-align:center}
  .done-score{font-size:42px;font-weight:700;color:var(--text);margin:0.5rem 0}
  .done-pct{font-size:15px;color:var(--muted);margin-bottom:1.5rem}
  .done-btns{display:flex;flex-direction:column;gap:10px}
  .done-btns button{padding:14px;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;border:1px solid var(--line);min-height:50px}
  .done-btns button.primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
  .done-btns button.sec{background:var(--surface);color:var(--text)}
  .done-btns button:active{transform:scale(0.97)}
  .essay-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
  .essay-q{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:0.75rem}
  .essay-toggle{font-size:14px;color:var(--link);background:none;border:none;cursor:pointer;padding:8px 0;text-align:left;font-weight:500;min-height:40px}
  .essay-ans{margin-top:0.75rem;font-size:14px;line-height:1.8;color:var(--soft);display:none;border-top:1px solid var(--border);padding-top:0.75rem}
  .essay-ans.show{display:block}
  .section-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:0.75rem;letter-spacing:0.05em}
  .back-btn{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--text);font-size:15px;font-weight:500;cursor:pointer;margin-bottom:1rem;min-height:50px}
  .progress-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin-bottom:1rem;overflow:hidden}
  .progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width 0.3s}

  /* 字卡模式 */
  .fc-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
  .fc-back{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px;min-width:32px}
  .fc-title{font-size:16px;font-weight:600;color:var(--text)}
  .fc-type-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
  .fc-type-btn{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--surface);color:var(--soft);cursor:pointer;transition:all 0.15s}
  .fc-type-btn.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
  .fc-prog{font-size:13px;color:var(--muted);text-align:right;margin-bottom:0.5rem}
  .fc-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;min-height:200px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;transition:transform 0.1s,background 0.15s;user-select:none}
  .fc-card:active{transform:scale(0.99)}
  .fc-card-type{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;margin-bottom:12px;display:inline-block}
  .fc-card-type.數字{background:var(--tag-bg);color:var(--tag-tx)}
  .fc-card-type.比較{background:var(--tag2-bg);color:var(--tag2-tx)}
  .fc-card-type.考題{background:var(--tag3-bg);color:var(--tag3-tx)}
  .fc-question{font-size:15px;line-height:1.8;color:var(--text)}
  .fc-hint{font-size:12px;color:var(--muted);margin-top:1rem}
  .fc-answer{margin-top:1rem;width:100%}
  .fc-answer-main{font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px}
  .fc-answer-exp{font-size:13px;color:var(--soft);line-height:1.7;text-align:left;background:var(--surface2);border-radius:10px;padding:10px 12px;border-left:3px solid var(--line)}
  .fc-btns{display:flex;gap:8px;margin-top:0.75rem}
  .fc-btns button{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:500;border:1px solid var(--line);background:var(--surface);cursor:pointer;transition:all 0.12s;min-height:48px}
  .fc-btns button.ok{color:var(--ok-bd)}
  .fc-btns button.ng{color:var(--ng-bd)}
  .fc-btns button:active{transform:scale(0.97)}
  .fc-done{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem 1.5rem;text-align:center}
  .fc-compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem;width:100%;text-align:left}
  .fc-compare-col{background:var(--surface2);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.7;color:var(--soft)}
  .fc-compare-col-title{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
  .fc-entry{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:0.75rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.12s;min-height:56px}
  .fc-entry:active{background:var(--surface2)}
  .fc-entry-left{display:flex;flex-direction:column}
  .fc-entry-name{font-size:15px;font-weight:600;color:var(--text)}
  .fc-entry-desc{font-size:12px;color:var(--muted);margin-top:2px}
  .fc-entry-arrow{font-size:18px;color:var(--muted)}
  .fc-progress-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin-bottom:1rem;overflow:hidden}
  .fc-progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width 0.3s}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <h1>會計師考試練習</h1>
      <p class="subtitle">110–114年 公司法・證券交易法・商業會計法（共125題）</p>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="切換深淺色">🌙</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num c" id="s-correct">0</div><div class="stat-label">本次答對</div></div>
    <div class="stat"><div class="stat-num w" id="s-wrong">0</div><div class="stat-label">本次答錯</div></div>
  </div>

  <div id="flash-area" style="display:none"></div>

  <div class="filter-bar">
    <button class="filter-btn cat-btn active" data-cat="all" onclick="setCat('all',this)">全部科目</button>
    <button class="filter-btn cat-btn" data-cat="公司法" onclick="setCat('公司法',this)">公司法</button>
    <button class="filter-btn cat-btn" data-cat="證券交易法" onclick="setCat('證券交易法',this)">證交法</button>
    <button class="filter-btn cat-btn" data-cat="商業會計法" onclick="setCat('商業會計法',this)">商會法</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn yr-btn active" data-yr="all" onclick="setYr('all',this)">全部年度</button>
    <button class="filter-btn yr-btn" data-yr="110" onclick="setYr('110',this)">110</button>
    <button class="filter-btn yr-btn" data-yr="111" onclick="setYr('111',this)">111</button>
    <button class="filter-btn yr-btn" data-yr="112" onclick="setYr('112',this)">112</button>
    <button class="filter-btn yr-btn" data-yr="113" onclick="setYr('113',this)">113</button>
    <button class="filter-btn yr-btn" data-yr="114" onclick="setYr('114',this)">114</button>
    <button class="filter-btn wrong-filter" id="wrong-btn" onclick="reviewWrong(this)">錯題 <span id="wrong-count">0</span></button>
    <button class="filter-btn" style="margin-left:auto" onclick="goFlash()">字卡 ↗</button>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar" style="width:4%"></div></div>
  <div class="prog" id="prog-text">1 / 25</div>

  <div id="quiz-area"></div>
  <div id="essay-area"></div>
</div>

<script>
const ALL_QS = [
  {id:1,yr:114,cat:'公司法',q:'下列何種公司為他公司有限責任股東時，原則上受法定投資額度之限制？',opts:['無限公司','股東只有一人之公司','發行特別股之公司','公開發行股票之公司'],ans:3,exp:'依公司法第13條，公開發行股票之公司為他公司有限責任股東時，投資總額除以投資為專業或公司章程另有規定或經股東會決議者外，不得超過實收股本總額40%。'},
  {id:2,yr:114,cat:'公司法',q:'有關有限公司董事之敘述，下列何者錯誤？',opts:['最多得設置董事三人','董事須具有股東身分','董事任期不得逾三年，但得連選連任','董事出資之轉讓須得其他股東表決權三分之二以上之同意'],ans:0,exp:'依公司法第108條，有限公司董事人數一至數人，並非以「三人」為上限，故「最多得設置董事三人」之敘述有誤。（官方答案A）'},
  {id:3,yr:114,cat:'公司法',q:'非公開發行股票之A公司已發行300萬股，增資發行新股100萬股，甲目前持有9萬股。若本次發行新股董事會決議由員工認購10%，則甲就該次發行新股之股東優先認購權有多少股？',opts:['20,250股','22,500股','27,000股','30,000股'],ans:2,exp:'員工保留10%=10萬股；剩餘90萬股由原股東優先認購。甲持股比例=9/300=3%。90萬×3%＝27,000股。（官方答案C）'},
  {id:4,yr:114,cat:'公司法',q:'A公司召開股東會時，下列何人所持有A公司股份數，算入A公司已發行股份總數？',opts:['自然人甲持有之無表決權特別股1萬股','A公司為3年內轉讓員工目的而持有之10萬股（庫藏股）','A公司持有80%股份之B公司所持有之3萬股','A公司雖未持有C公司股份，但其董事過半數與C公司相同，C公司所持有之2萬股'],ans:0,exp:'無表決權特別股雖不能行使表決權，但仍算入已發行股份總數。庫藏股、控制從屬公司持股則依法不算入。'},
  {id:5,yr:114,cat:'公司法',q:'A公司為非公開發行股票之公司，董事甲在某市擁有一塊土地，A公司擬向甲購買，應由何人代表公司？',opts:['董事長','獨立董事','監察人','總經理'],ans:2,exp:'依公司法第223條，董事與公司為買賣等法律行為時，由監察人代表公司，以防止利益衝突。'},
  {id:6,yr:114,cat:'公司法',q:'A股份有限公司董事會擬現金發行新股一百萬股，依公司法規定，原則上應至少保留多少股份由員工承購？',opts:['五萬股','十萬股','十五萬股','五十萬股'],ans:1,exp:'依公司法第267條，公司發行新股時，應保留發行新股總數10%至15%由員工承購。100萬股×10%＝10萬股（最低門檻）。'},
  {id:7,yr:114,cat:'公司法',q:'A公司持有B公司60%股份，使B公司為不合營業常規之經營，未為適當補償致B公司受損，A公司未賠償時，下列何者得以自己名義請求A公司對B公司為給付？',opts:['B公司之獨立董事','對B公司有相當於B公司淨值5%債權之債權人','繼續一年以上持有A公司10%以上股份之股東','A公司之目的事業主管機關'],ans:1,exp:'依公司法第369條之4，控制公司使從屬公司受損而未補償時，從屬公司之債權人（債權相當於從屬公司淨值5%以上）得以自己名義，請求控制公司對從屬公司為給付。'},
  {id:8,yr:114,cat:'公司法',q:'A公司是依英國公司法設立登記的外國公司，下列敘述何者錯誤？',opts:['A公司應經認許，始得在我國境內營業','A公司在我國設立分公司者，名稱應譯成中文，並標明種類及國籍','A公司若在我國設立分公司，應專撥其營業所用之資金，並指定在我國境內之負責人','A公司於法令限制內，與本國公司有同一之權利能力'],ans:0,exp:'外國公司已廢除「認許制」，改採登記報備制，故選項A「應經認許」為錯誤敘述。'},
  {id:9,yr:114,cat:'公司法',q:'甲、乙、丙三人擬設立A股份有限公司，依公司法規定，下列敘述何者錯誤？',opts:['A公司應於代表公司之負責人就任後十五日內，向主管機關申請設立登記','A公司申請登記得委任代理人，代理人僅以會計師為限','A公司各項登記文件，公司負責人或利害關係人，得聲敘理由請求查閱、抄錄或複製','A公司得向主管機關申請公司外文名稱登記'],ans:1,exp:'代理人並非僅限會計師，律師等其他人亦可擔任。故「代理人僅以會計師為限」為錯誤敘述。'},
  {id:10,yr:114,cat:'公司法',q:'非公開發行之股份有限公司，依公司法規定，下列敘述何者正確？',opts:['可不發行股票','應於發行新股變更登記後1個月內發行股票','應於發行新股變更登記後2個月內發行股票','應於發行新股變更登記後3個月內發行股票'],ans:0,exp:'依公司法第161條之2，非公開發行股票之公司，得不發行股票，故選項A正確。'},
  {id:11,yr:114,cat:'公司法',q:'下列何者並非公司法明定之股份有限公司股東會召集權人？',opts:['監察人','繼續3個月以上持有已發行股份總數過半數股份之股東','董事長','董事會'],ans:1,exp:'公司法明定之召集權人為董事會、監察人（特定情況）、持有3%以上且繼續1年以上之股東（聲請法院許可後）。「持有過半數股份之股東」並非法定直接召集權人。'},
  {id:12,yr:114,cat:'公司法',q:'下列何者為董事缺額時，股份有限公司應盡速召開股東臨時會補選之最低門檻？',opts:['全部退任','三分之二','過半','三分之一'],ans:3,exp:'依公司法第201條，董事會之董事缺額達三分之一時，董事會應於30日內召集股東臨時會補選之。'},
  {id:13,yr:114,cat:'證券交易法',q:'關於A興櫃公司欲上市募資，下列說明何者正確？',opts:['甲股東持有大量特別股，若於上市前公開勸誘不特定人購買，須向主管機關申報生效','主管機關基於公益可要求補正說明，但屆期仍應讓其生效、不得延遲','A公司上市申報生效後，乙董事長可在公開聚會上表示政府認同其商業模式廣受青睞','A公司曾公開招募出售認股權憑證，因尚未上市，無須申報生效'],ans:0,exp:'依證券交易法第22條，有價證券之募集及發行，非向主管機關申報生效後不得為之。特別股屬有價證券，故公開勸誘不特定人購買仍須申報生效。'},
  {id:14,yr:114,cat:'證券交易法',q:'A公司上市後再度增資現金發行新股，就股權分散規定，下列何者正確？',opts:['改以盈餘撥充資本發行，仍應提撥一定比率對外公開發行','發行新股時，不須讓員工依公司法承購10%至15%的股份','發行新股時，須提撥至少10%由原股東按比例分認，其餘強制對外公開發行','若擬以每股53元發行，員工要求以52元認購，公司回應以53元認購始為合法'],ans:3,exp:'依證券交易法第28條之1，員工承購新股之價格不得低於公開發行價格。發行價格53元時，員工要求以52元認購不合法，公司堅持53元為正確做法。'},
  {id:15,yr:114,cat:'證券交易法',q:'甲為股票上市A公司董事，欲於集中交易市場出售持股，得免向主管機關申報之每日出售數量上限為何？',opts:['一千股','三千股','五千股','一萬股'],ans:3,exp:'依相關規定，內部人於集中市場每日賣出股數未超過一萬股者，得免申報。'},
  {id:16,yr:114,cat:'證券交易法',q:'A股份有限公司申請股票上櫃交易，下列敘述何者正確？',opts:['A公司應達經濟部規定之規模，方得申請上櫃交易','A公司通過上櫃審查後，應與證券櫃檯買賣中心簽訂上櫃契約','上櫃契約應經證券主管機關核准始生效力','股票上櫃買賣後，依法不得進行場外交易'],ans:1,exp:'申請上櫃通過審查後，公司應與櫃買中心簽訂上櫃契約。上櫃規模要件由金管會（非經濟部）訂定，上櫃契約亦毋須另行核准。'},
  {id:17,yr:114,cat:'證券交易法',q:'甲得知同事乙持有上市A公司股票3張欲獲利了結，便私下向乙買入1張，甲乙間之交易行為是否合法？',opts:['違法，因上市公司股票買賣應委託證券經紀商辦理','違法，因上市公司股票買賣應於集中交易市場為之','合法，但甲須於向主管機關申報之日起3日內買入','合法，因乙於3個月內僅轉讓1張給甲'],ans:3,exp:'依證券交易法第150條但書，在特定情形下（如3個月內轉讓數量未超過一定門檻）可豁免於集中市場交易之要求，故本交易合法。'},
  {id:18,yr:114,cat:'證券交易法',q:'依證券交易法，公開發行公司召集股東會時，下列何事項應在召集事由中列舉說明，不得以臨時動議提出？',opts:['決議對董事提起訴訟','實施庫藏股制度','選任臨時管理人','董事競業禁止之解除'],ans:1,exp:'依證券交易法第26條之1，實施庫藏股制度應列舉於召集事由，不得以臨時動議提出。'},
  {id:19,yr:114,cat:'證券交易法',q:'依證券交易法規定，下列何者不是上市公司得買回其股份之原因？',opts:['為維護公司信用及股東權益所必要而買回','只要有股東要求，無論理由為何公司即必須買回','為轉讓股份予員工','為配合可轉換公司債之發行，作為股權轉換之用'],ans:1,exp:'依證券交易法第28條之2，公司買回庫藏股之原因僅有法定三種，股東單純要求即須買回並非法定理由。'},
  {id:20,yr:114,cat:'證券交易法',q:'依證券交易法之規定，下列敘述何者錯誤？',opts:['A公司應於每會計年度終了後三個月內，公告並申報經查核簽證、董事會通過及監察人承認之年度財務報告','A公司應於每季終了後三十日內，公告並申報經會計師核閱及提報董事會之財務報告','A公司應於每月十日以前，公告並申報上月份營運情形','若股東常會承認之年度財務報告與公告申報者不一致，A公司應於事實發生之日起二日內公告並申報'],ans:0,exp:'依證券交易法第36條，年度財務報告應於每會計年度終了後「四個月」內公告申報，非三個月。故選項A為錯誤敘述。'},
  {id:21,yr:114,cat:'證券交易法',q:'甲連續侵占公開發行公司資金，實際侵占金額達數百萬元。下列敘述何者正確？',opts:['當甲具董事身分時，侵占致損害達新臺幣五百萬元以上，應依證券交易法第171條處罰','當甲具董事身分時，不論金額高低，均應依第171條處罰','不論甲為董事或受僱人，致損害達新臺幣五百萬元以上，均應依第171條處罰','不論甲為董事或受僱人，不論金額高低，均應依第171條處罰'],ans:2,exp:'依證券交易法第171條第1項第3款，不論身分為董事或受僱人，其行為致公司損害達新臺幣五百萬元以上者，始有本條適用。'},
  {id:22,yr:114,cat:'證券交易法',q:'甲為上櫃A公司董事長，3月5日中午12時董事會決議擬與B公司合併，甲於會議前1小時閱讀資料，下午1時公告合併消息。下列何時點購買A公司股票構成內線交易？①3月5日上午11時 ②3月5日下午1時20分 ③3月6日上午9時',opts:['僅①','僅①②','僅②③','①②③'],ans:1,exp:'甲於上午11時閱讀資料，已實際知悉重大消息，①構成內線交易。下午1時公告後，依規定公告後18小時內仍不得交易（消息尚未充分擴散），下午1時20分仍構成，②亦構成。3月6日上午9時已超過18小時，③不構成。故答案為①②。'},
  {id:23,yr:114,cat:'商業會計法',q:'商業會計法對於會計人員之規定，下列敘述何者錯誤？',opts:['股份有限公司之主辦會計人員聘任，應由董事會以董事過半數出席，及出席董事過半數之同意','有限公司之主辦會計人員聘任，應有全體股東過半數之同意','商業應設置會計人員','公司任用會計師處理商業會計事務，應經監察人之同意'],ans:3,exp:'依商業會計法第5條，商業得委託會計師辦理商業會計事務，並無須經監察人同意之規定，故選項D為錯誤敘述。'},
  {id:24,yr:114,cat:'商業會計法',q:'商業會計法對於會計憑證之規定，下列敘述何者錯誤？',opts:['會計事項之發生，均應取得、給予或自行編製足以證明之會計憑證，違反者處罰對象包括商業本身','經濟部對於記帳憑證之名稱及格式有相關公告，但商業得依實際需要增訂','對外憑證除應記載憑證名稱、日期、交易雙方名稱及地址或統一編號、交易內容及金額之外，由開具人簽名或蓋章','原始憑證因事實上限制無法取得，應根據事實或金額作成憑證，由商業負責人或其指定人員簽名或蓋章，憑以記帳'],ans:1,exp:'記帳憑證之名稱及格式由商業自行訂定，並非由經濟部公告。故選項B為錯誤敘述。'},
  {id:25,yr:114,cat:'商業會計法',q:'採曆年制之商業，其決算最晚應於每年何時之前辦理完竣？',opts:['每年2月末日','每年4月15日','每年4月30日','每年5月15日'],ans:2,exp:'依商業會計法及相關規定，採曆年制之商業決算應於次年4月30日前辦理完竣。'},
  {id:101,yr:110,cat:"公司法",q:"A財團法人為環境保育團體須向B銀行借款。C股份有限公司董事長甲得全體股東同意，代表C公司為A財團法人借款對B銀行提供保證，惟相關法律與C公司章程均無C公司得為保證之規定。C公司對B銀行是否負保證責任？",opts:["不負保證責任", "簽約後即負保證責任", "於得到A財團法人承認後始負保證責任", "於得到公司法主管機關許可後始負保證責任"],ans:0,exp:"依公司法第16條，公司除依法律或章程規定得為保證者外，不得為任何保證人。違反者該保證對公司不生效力，故C公司不負保證責任，由負責人自負其責。"},
  {id:102,yr:110,cat:"公司法",q:"A公司總經理甲擬兼任B公司之總經理，若A公司章程無特別規定，依公司法應經何程序始可兼任？",opts:["股東會普通決議", "股東會特別決議", "董事會普通決議", "經理人不可兼任其他營利事業經理人"],ans:2,exp:"依公司法第32條，經理人不得兼任其他營利事業之經理人，但經依第29條第1項規定之方式（股份有限公司為董事會以董事過半數出席、出席過半數同意）同意者，不在此限。"},
  {id:103,yr:110,cat:"公司法",q:"A有限公司章程設董事三人，對外代表權無特別規定，何人可對外代表公司？",opts:["董事三人均可單獨代表公司", "董事三人應共同代表公司", "須由三人推舉董事長一人始能對外代表", "應經股東表決權三分之二以上同意選出董事長始能代表"],ans:0,exp:"依公司法第108條，有限公司董事有數人時，得以章程置董事長一人對外代表公司；章程未特別規定時，各董事均得對外代表公司。"},
  {id:104,yr:110,cat:"公司法",q:"非公開發行股票且非閉鎖性之股份有限公司，不得發行下列哪一種特別股？",opts:["每股10表決權之特別股", "對於公司「董事選舉之結果」具否決權之特別股", "發行滿2年後1股特別股得轉換為10股普通股之特別股", "無表決權但具優先分派當年度股息之特別股"],ans:1,exp:"依公司法第157條，非公開發行公司得發行複數表決權、特定事項否決權等特別股，但對「董事選舉結果」具否決權之特別股則不被允許。"},
  {id:105,yr:110,cat:"公司法",q:"非公開發行公司買回公司股份轉讓給員工之行為，下列何者正確？",opts:["買回應經股東會特別決議", "買回後應在2年內轉讓員工否則視為未發行股份辦理變更登記", "買回股份不得超過已發行股份總數百分之五", "閉鎖型公司不得為轉讓員工目的買回股份"],ans:1,exp:"依公司法第167條之1，公司買回自己股份轉讓予員工者，應於三年內轉讓（註：依當年度條文版本，本題官方答案為B，請對照現行三年規定）。"},
  {id:106,yr:110,cat:"公司法",q:"A公司位於臺北市大安區，資本額為新臺幣10億元，A公司的公司登記相關業務應至何政府單位辦理？",opts:["經濟部", "臺北市政府", "金融監督管理委員會", "財政部"],ans:0,exp:"依公司登記管轄規定，實收資本額達一定金額（5億元以上）之公司，由經濟部商業司管轄登記。"},
  {id:107,yr:110,cat:"公司法",q:"於非公開發行之股份有限公司，下列何種議案公司法並未明定應有代表已發行股份總數三分之二以上股東出席、出席表決權過半數同意行之？",opts:["解任董事", "董事競業許可", "減資（未涉及變更章程）", "變更章程"],ans:2,exp:"減資若未涉及變更章程，公司法並未明定須三分之二以上股東出席之特別決議門檻；解任董事、董事競業許可、變更章程則屬特別決議事項。"},
  {id:108,yr:110,cat:"公司法",q:"A公司為B公司之控制公司。B公司以名下土地設定抵押向A公司借2億元。A公司利用控制力使B公司從事不利益經營致受1億元損害，下列敘述何者錯誤？",opts:["A公司對1億元損害應於年度終了時為適當補償，否則負損害賠償責任", "A公司不得以對B公司2億元債權主張抵銷1億元損害賠償", "B公司重整時A公司2億元債權縱有抵押權仍應次於其他債權受償", "A公司若未賠償，B公司股東不問持股多寡均得訴請A公司對B公司給付"],ans:3,exp:"依公司法第369條之4，須繼續一年以上持有已發行股份總數1%以上之股東，始得請求控制公司對從屬公司給付，並非「不問持股多寡」，故D錯誤。"},
  {id:109,yr:110,cat:"公司法",q:"甲乙丙丁戊五人各持有A工業股份有限公司五分之一股份。關於董事選舉，下列何者錯誤？",opts:["可依章程選舉董事三人，五人都可被選為董事", "可不設董事會，章程規定僅由股東會選出董事一人擔任董事長並行使董事會職權", "可設董事會，由五位股東直接選出董事長對外代表公司", "若甲配偶辛具財務專長，經股東會選舉後也可當選董事"],ans:2,exp:"董事長應由董事會（或依章程）選舉產生，非由股東直接選出；股東會選董事，董事再互選董事長。故C敘述錯誤。"},
  {id:110,yr:110,cat:"公司法",q:"A公司擬與其董事甲交易土地，董事會討論時董事甲出席未說明利害關係且未迴避表決。該次董事會決議效力為何？",opts:["無效", "得撤銷", "效力未定視監察人事後追認", "效力未定視股東會事後追認"],ans:0,exp:"依公司法第206條準用第178條，董事對於會議事項有自身利害關係時應自行迴避，違反迴避義務之決議無效。"},
  {id:111,yr:110,cat:"公司法",q:"甲為A股份有限公司之監察人，關於甲之敘述何者正確？",opts:["甲不得同時為A公司超過10%之股東", "甲不得同時為A公司之經理人", "甲不得列席董事會", "甲不得代表公司委任會計師協助執行職務"],ans:1,exp:"依公司法第222條，監察人不得兼任公司董事、經理人或其他職員。監察人得列席董事會、得代表公司委任會計師。"},
  {id:112,yr:110,cat:"公司法",q:"A公司有甲乙丙三席董事，甲為董事長並久久拒絕召集董事會。下列敘述何者正確？",opts:["甲為唯一召集權人無人可替代", "乙或丙各自書面請求並經15日後即得召集", "乙與丙共同書面請求並經15日後即得召集", "監察人丁即可代甲行使召集權"],ans:0,exp:"本題官方答案為A。註：依公司法第203條之1修正後，過半數董事得請求並自行召集，作答時請對照當年度條文版本。"},
  {id:113,yr:110,cat:"證券交易法",q:"有關證券交易法及公司法所規範之私募有價證券，下列何者錯誤？",opts:["公開發行公司私募普通公司債須經股東會特別決議", "非公開發行公司得私募普通公司債", "公開發行公司私募應募人如為金融機構則不計入35人限制", "公開發行公司私募有價證券應於價款繳納完成日起15日內報請主管機關備查"],ans:3,exp:"依證券交易法第43條之6，公開發行公司私募普通公司債得由董事會決議，無須股東會特別決議（A錯誤亦為常見爭點）；惟本題官方答案為D，私募應於價款繳納完成日起15日內報請備查之敘述有誤，應為事後報備但天數規定不同。"},
  {id:114,yr:110,cat:"證券交易法",q:"下列何者於募集與發行時，應事先向證券主管機關申報？",opts:["在櫃買中心創櫃板發行普通股股票", "中央及地方政府發行的債券", "於股權性質群眾募資平台募集發行之不具債權性質特別股", "可轉換公司債"],ans:0,exp:"本題官方答案為A。創櫃板發行普通股股票之募集發行，依規定應事先向證券主管機關申報。"},
  {id:115,yr:110,cat:"證券交易法",q:"關於公開發行公司應編製公開說明書之規定，下列敘述何者正確？",opts:["公司募集發行股票於申報時應加具公開說明書", "公司進行私募應依特定人合理請求加具公開說明書", "公司募集發行股票無需編製公開說明書", "公司募集發行公司債無需編製公開說明書"],ans:3,exp:"本題官方答案為D。註：依證券交易法第30條，公司募集發行有價證券應編製公開說明書；本題依官方公告答案為D，作答時請對照題意與當年度標準答案。"},
  {id:116,yr:110,cat:"證券交易法",q:"上市公司之董事、監察人、經理人或持股超過10%之股東，其股票轉讓方式下列敘述何者錯誤？",opts:["自申報主管機關生效日後向非特定人為之", "自向主管機關申報之日起三日後於集中交易市場賣出", "於申報之日起三日內向符合主管機關所定條件之特定人為之", "每一交易日轉讓股數未超過100,000股者免予申報"],ans:1,exp:"依證券交易法第22條之2，內部人持股轉讓方式有三種法定途徑；於集中市場賣出之申報期間規定與選項B所述不符，故B錯誤。"},
  {id:117,yr:110,cat:"證券交易法",q:"甲為A上市公司董事長，1月10日以每股10元買進一萬股，3月15日以每股18元賣出一萬股。甲之行為應負證券交易法上何種責任？",opts:["沖洗買賣", "短線交易", "內線交易", "甲並無任何法律責任"],ans:3,exp:"本題官方答案為D。註：依證券交易法第157條短線交易歸入權，公司董事六個月內買進賣出獲利原應歸入公司，本題依官方公告答案為D，作答時請對照題目細節與當年度標準答案。"},
  {id:118,yr:110,cat:"證券交易法",q:"A上市公司董事長甲於某日開盤後知悉重大消息，當日收盤後進行股票交易而有內線交易之嫌。何者較可能使其交易不構成內線交易？",opts:["該特定消息已於其知悉之當日早上公開", "當日股票交易結算後並無獲利", "已於當日早上辭去董事長及董事職務", "所知悉消息仍在發展初期尚未明確"],ans:0,exp:"內線交易須於重大消息「明確後、公開前」交易始構成。若消息於知悉當日早上即已公開，則甲於收盤後交易時消息已公開，不構成內線交易。"},
  {id:119,yr:110,cat:"證券交易法",q:"依證券交易法之規定，下列敘述何者錯誤？",opts:["集中保管之有價證券買賣交割得以帳簿劃撥方式為之", "凡依證券交易法所訂立之契約均應以書面為之", "董事應每月5日前將上月持股變動向公司申報，公司應於每月15日前彙總向主管機關申報", "新股認購權利證書之轉讓得於原股東認購新股之限期後為之"],ans:3,exp:"依證券交易法第6條及相關規定，新股認購權利證書之轉讓應於原股東認購新股之「限期前」為之，故D敘述錯誤。"},
  {id:120,yr:110,cat:"證券交易法",q:"依證券交易法，下列何者不需要於發行人所編製之財務報告上簽名或蓋章並出具內容無虛偽隱匿之聲明？",opts:["董事長", "監察人", "經理人", "會計主管"],ans:1,exp:"依證券交易法第14條，財務報告應由董事長、經理人及會計主管簽名蓋章並出具聲明，監察人不在此列。"},
  {id:121,yr:110,cat:"證券交易法",q:"甲成立A綜合證券商，A公司不得從事下列何種業務？",opts:["有價證券之上市審核", "有價證券之承銷", "有價證券之自行買賣", "有價證券買賣之行紀、居間與代理"],ans:0,exp:"有價證券之上市審核為證券交易所之職權，非證券商業務。承銷、自行買賣、行紀居間代理則為證券商之法定業務。"},
  {id:122,yr:110,cat:"商業會計法",q:"關於商業會計法中營業收入之認列，下列敘述何者錯誤？",opts:["採現金收付制之商業於現金收付時認列", "分期付款銷貨收入得視性質按淨利百分比法攤算入帳", "勞務收入依性質分段提供者得分段認列", "採權責發生制之商業於交付貨品或提供勞務完畢時認列"],ans:1,exp:"分期付款銷貨收入得按「毛利百分比法」攤算入帳，非「淨利百分比法」，故B敘述錯誤。"},
  {id:123,yr:110,cat:"商業會計法",q:"依商業會計法規定，下列敘述何者正確？",opts:["記帳憑證及會計帳簿均應由負責人、經理人、主辦及經辦會計人員簽名蓋章", "記帳憑證及會計帳簿均得由負責人授權經理人、主辦或經辦會計人員簽名蓋章", "記帳憑證及會計帳簿應由負責人、經理人、主辦及經辦會計人員簽名蓋章，但記帳憑證得由負責人授權經理人、主辦或經辦會計人員簽名蓋章", "記帳憑證及會計帳簿應由負責人、經理人、主辦及經辦會計人員簽名蓋章，但會計帳簿得由負責人授權"],ans:2,exp:"依商業會計法第36條，記帳憑證及會計帳簿應由負責人、經理人、主辦及經辦會計人員簽名或蓋章；但記帳憑證得由代表商業之負責人授權經理人、主辦或經辦會計人員簽名或蓋章。故C正確。"},
  {id:124,yr:110,cat:"商業會計法",q:"商業會計法及商業會計處理準則對於會計憑證之規定，下列敘述何者正確？",opts:["商業會計事務較簡者得不另製記帳憑證而以原始憑證作為記帳憑證", "記帳憑證保管期限屆滿後經經辦人員核准得予以銷毀", "各項會計憑證除應永久保存或有關未結會計事項者外，應於年度決算程序辦理終了後至少保存10年", "原始憑證因事實限制無法取得，主辦會計得令經辦及主管該事項之人員分別或共同證明"],ans:2,exp:"依商業會計法第38條，各項會計憑證除應永久保存或有關未結會計事項者外，應於年度決算程序辦理終了後至少保存五年（註：本題官方答案為C「10年」，係指會計帳簿；憑證為5年，作答請對照當年度題意與標準答案）。"},
  {id:125,yr:111,cat:"公司法",q:"自然人甲希望成立只有自己為股東的公司，且其對公司債務責任只限於出資額。甲應成立何種類型公司較符合需求？",opts:["無限公司", "有限公司", "兩合公司", "股份有限公司"],ans:1,exp:"依公司法第98條，有限公司得由一人以上股東組織，股東就其出資額為限對公司負責，符合一人股東且有限責任之需求。"},
  {id:126,yr:111,cat:"公司法",q:"A股份有限公司擬解任總經理甲，若章程無特別規定，依公司法應依何程序決策？",opts:["股東會普通決議", "股東會特別決議", "董事會普通決議", "董事長核可"],ans:2,exp:"依公司法第29條，股份有限公司經理人之委任、解任，應由董事會以董事過半數出席、出席過半數同意行之。"},
  {id:127,yr:111,cat:"公司法",q:"甲乙丙丁戊五人投資A有限公司並選出甲乙丙三人擔任董事，該公司應由何人為監督機關行使監察權？",opts:["甲乙丙三人同時為業務執行及監督機關", "甲乙丙互推一人為監督機關", "丁戊互推一人為監督機關", "丁戊均為監督機關"],ans:3,exp:"依公司法第109條，有限公司不執行業務之股東均得行使監察權。丁、戊未任董事，均為監督機關。"},
  {id:128,yr:111,cat:"公司法",q:"下列對於股份有限公司發起人之敘述，何者錯誤？",opts:["發起人之股份非於公司設立登記一年後不得轉讓", "發起人對公司在設立登記前所負債務在登記後亦負連帶責任", "應有二人以上為發起人，但政府或法人股東一人組織者不受人數限制", "未認足之第一次發行股份及已認未繳股款者應由發起人連帶認繳"],ans:0,exp:"依公司法第163條，公司股份之轉讓原則自由，發起人股份轉讓之限制已刪除，故A「非於設立登記一年後不得轉讓」為錯誤敘述。"},
  {id:129,yr:111,cat:"證券交易法",q:"公開發行股票公司，其董事在任期中轉讓超過選任當時所持有公司股份數額二分之一時，下列敘述何者正確？",opts:["轉讓行為違反法律禁止規定而無效", "二分之一係採單次交易計算", "董事在任期中股份有增減時應向主管機關申報並公告", "該董事由股東會特別決議解任"],ans:3,exp:"依公司法第197條，董事任期中轉讓超過選任時持股二分之一者，其董事當然解任（本題官方答案為C，註：依當年度條文，董事持股增減應申報公告，作答請對照標準答案）。"},
  {id:130,yr:111,cat:"公司法",q:"非公開發行之股份有限公司，下列何種議案得於股東會中以臨時動議提出？",opts:["董事競業許可", "盈餘轉增資", "將已發行票面金額股全數轉換為無票面金額股", "公積轉增資"],ans:3,exp:"依公司法相關規定，公積轉增資（發行新股）得以臨時動議提出；董事競業許可、票面金額股轉換等屬應列舉於召集事由之事項。"},
  {id:131,yr:111,cat:"證券交易法",q:"下列何種公司，其股東會必須採書面方式行使表決權？",opts:["上市（櫃）公司", "非公開發行公司", "公開發行公司", "公司法並未強制股份有限公司採行此制"],ans:3,exp:"本題官方答案為D。股東會書面或電子方式行使表決權並非強制，由公司章程訂定；惟特定主管機關得就符合條件之公開發行公司命令採行，作答請對照題意。"},
  {id:132,yr:111,cat:"證券交易法",q:"A公開發行公司章程採候選人提名制度，公司派提名董事九人，市場派欲提名甲乙丙三人，下列敘述何者錯誤？",opts:["市場派須為持有已發行股份總數1%股份之股東並以書面提出候選人名單", "A公司應於股東會召開前停止過戶日前訂十日以上期間公告受理提名", "市場派提名時應敘明被提名人重要學經歷並檢附證明文件", "董事長丁故意不將甲乙丙列入候選人名單，主管機關得對丁處24萬元以上240萬元以下罰鍰"],ans:2,exp:"依公司法第192條之1，提名股東無須檢附被提名人學經歷之證明文件（修法後簡化），故C敘述錯誤。"},
  {id:133,yr:111,cat:"公司法",q:"A公司擬與其董事甲之配偶乙交易土地，董事會討論該交易案時下列敘述何者正確？",opts:["甲不得出席該次董事會", "甲不得就該土地交易案行使表決權", "甲經說明利害關係後始得行使表決權", "乙對董事會應負說明義務"],ans:1,exp:"依公司法第206條準用第178條，董事對於有自身利害關係之事項不得加入表決，但仍得出席及說明。甲之配偶交易涉甲利害關係，甲不得行使表決權。"},
  {id:134,yr:111,cat:"公司法",q:"A公司之法人股東B指派甲當選A公司董事並被推選為董事長，B事後改派乙為法人代表。下列敘述何者正確？",opts:["A公司須重新選出新任董事長", "甲董事長身分未因被撤換而改變", "乙當然繼任為A公司董事長", "何人擔任A公司董事長應由B決定"],ans:0,exp:"依公司法第27條，法人股東改派代表人時，原當選之董事職務即終止。甲既被撤換代表權，其董事及董事長身分均喪失，A公司須重新選任董事長。"},
  {id:135,yr:111,cat:"公司法",q:"A公司持有B公司50%表決權股份並控制C公司業務；A有9席董事，D有5席董事其中4名與A相同；A持有E公司25%股份，B、C、D各持有E公司10%。依公司法下列何者為A公司之從屬公司？",opts:["B公司", "C公司", "D公司", "E公司"],ans:2,exp:"依公司法第369條之2、之3，A對C有實質控制（從屬）、對D因董事過半數相同而推定有控制從屬關係。本題官方答案為C，註：判斷從屬公司須綜合持股與控制力，作答請對照題意。"},
  {id:136,yr:111,cat:"公司法",q:"依公司法規定，下列何者不是A公司董事長甲之職權範圍？",opts:["擔任董事會之召集權人", "擔任股東會之主席", "A公司對外簽約之公司代表人", "A公司與董事乙簽訂買賣契約時之公司代表人"],ans:3,exp:"依公司法第223條，公司與董事間之交易，由監察人代表公司，非由董事長代表，故D非董事長職權。"},
  {id:137,yr:111,cat:"證券交易法",q:"A上市公司公開發行新股增資後股價暴跌，受損投資人欲援引證交法第32條公開說明書不實規定求償，下列何者非屬可求償對象？",opts:["A公司", "A公司負責人", "未在公開說明書上簽章之公司職員", "未在公開說明書上簽章之A公司該發行案證券承銷商"],ans:2,exp:"依證券交易法第32條，求償對象為發行人、負責人、在公開說明書簽章之職員及承銷商等。未簽章之職員不在求償對象之列，故C非屬之。"},
  {id:138,yr:111,cat:"證券交易法",q:"公開發行公司經三分之二以上股東出席、出席過半數同意進行私募，應募人均為銀行或保險業共40家，於股款收畢後第7日報請主管機關備查。下列敘述何者錯誤？",opts:["本件私募案之應募人數超額", "本件私募案股東會決議門檻不符證交法規定", "雖非上市櫃公司仍可辦理私募", "本件私募案毋須事先向主管機關申報"],ans:2,exp:"依證券交易法第43條之6，應募人若為銀行、保險等專業機構投資人，不受35人限制；股東會決議門檻符合；私募無須事先申報。故C「雖非上市櫃公司仍可辦理私募」之敘述本身正確，本題官方答案為C係指其為「錯誤」選項之配置，作答請對照標準答案C。"},
  {id:139,yr:111,cat:"公司法",q:"股票上櫃之A公司章程設五席董事，董事甲與乙於出差途中因交通事故同時身亡，A公司如何填補董事空缺？",opts:["於最近一次股東會補選", "於出缺事實發生日起30日內召集董事會決議補選日期", "於出缺事實發生日起60日內召開股東臨時會補選", "A公司仍有三席董事不必補選"],ans:2,exp:"依公司法第201條，董事缺額達三分之一（5席缺2席達2/5＞1/3）時，應於60日內召開股東臨時會補選。"},
  {id:140,yr:111,cat:"證券交易法",q:"A為上市公司，剛申報第一季財報，因營運不佳致董事長與總經理皆變動。依證交法下列敘述何者正確？",opts:["第一季財報應於每會計年度終了後三個月內公告申報", "所公告之第一季財報應經會計師查核簽證、董事會通過及監察人承認", "董事長與總經理發生變動應於事實發生日起二日內公告申報", "董事長與總經理發生變動應於事實發生日起三日內公告申報"],ans:3,exp:"本題官方答案為D。註：依證交法第36條，第一季財報應於季後45日內申報且經會計師核閱（非查核簽證）；重大訊息申報期間，作答請對照當年度標準答案D。"},
  {id:141,yr:111,cat:"證券交易法",q:"依證交法，除經主管機關核准外，公開發行公司最晚應於每會計年度終了後多久內向主管機關申報內部控制聲明書？",opts:["10日內", "45日內", "2個月內", "3個月內"],ans:3,exp:"依證券交易法及內部控制制度處理準則，公開發行公司應於每會計年度終了後三個月內申報內部控制制度聲明書。"},
  {id:142,yr:111,cat:"證券交易法",q:"公開發行股票公司董事每月股數變動資訊揭露，依證交法下列程序何者正確？",opts:["董事於每月5日前將上月持股變動逕向主管機關申報", "董事於每月5日前向公司申報，公司應於2日內發布重大訊息", "董事於每月5日前向公司申報，公司應於每月15日前逕行公告", "董事於每月5日前向公司申報，公司應於每月15日前彙總向主管機關申報"],ans:3,exp:"依證券交易法第25條，董事、監察人、經理人及大股東應於每月5日前將上月持股變動情形向公司申報，公司應於每月15日前彙總向主管機關申報。"},
  {id:143,yr:111,cat:"證券交易法",q:"A上櫃公司財報主要內容有虛偽隱匿，甲為董事長，乙為簽證會計師。依證交法，A公司、甲、乙中除下列何者外，因過失致財報不實損害者應依責任比例負賠償責任？",opts:["A公司", "A公司與甲", "甲", "甲與乙"],ans:3,exp:"依證券交易法第20條之1，發行人（A公司）負無過失責任不適用比例責任；負責人甲及簽證會計師乙因過失者，依其責任比例負賠償責任。本題官方答案為D，指甲與乙適用比例責任。"},
  {id:144,yr:111,cat:"證券交易法",q:"A上市公司董事甲違反內線交易規定，依法對當日善意相反買賣之人，就買入或賣出價格與消息公開後幾個營業日收盤平均價格之差額負賠償責任；情節重大者法院得將賠償額提高至幾倍？",opts:["三個營業日；二倍", "五個營業日；二倍", "七個營業日；三倍", "十個營業日；三倍"],ans:3,exp:"依證券交易法第157條之1，內線交易賠償以消息公開後「十個營業日」收盤平均價格計算差額；情節重大者法院得提高賠償額至「三倍」。"},
  {id:145,yr:111,cat:"證券交易法",q:"自然人甲於集中市場購得上市A公司已發行股份總計剛好為10%，依證交法甲應如何處置？",opts:["甲應申報且公告", "甲只須申報不必公告", "甲不必申報必須公告", "甲不必申報亦不必公告"],ans:1,exp:"本題官方答案為B。依證券交易法第43條之1，取得公開發行公司已發行股份總額超過一定比例者應申報；取得「達」10%之申報公告義務，作答請對照當年度標準答案B。"},
  {id:146,yr:111,cat:"證券交易法",q:"下列何人不得充任證券商之董事、監察人或經理人，其已充任者解任之？",opts:["甲曾任A法人宣告破產時之經理人，破產終結已逾三年", "B證券商經理人乙在未有投資關係亦未經核准下兼任C證券商研究員", "丙五年前在金融機構有拒絕往來紀錄", "丁曾犯詐欺罪經宣告有期徒刑六個月確定尚未執行"],ans:0,exp:"本題官方答案為A。依證券交易法第53條消極資格規定，曾任法人宣告破產時之董事、監察人、經理人等，須破產終結逾一定期間，作答請對照當年度標準答案A與條文細節。"},
  {id:147,yr:111,cat:"商業會計法",q:"下列涉及現金之交易，何者不符合商業會計法第9條之規定？",opts:["甲公司以活期存款取款條自銀行提取105萬元現金支付上游廠商貨款", "乙公司以活期存款取款條轉帳200萬元給債權人償還部分借款", "丙公司出售汽車而自某君收到110萬元現金", "丁公司購買機器設備電匯150萬元給賣方"],ans:2,exp:"依商業會計法第9條，商業之支出超過一定金額者應使用匯票、本票、支票、劃撥等方式，避免大額現金收付。丙公司收到110萬元「現金」不符規定。"},
  {id:148,yr:111,cat:"商業會計法",q:"依商業會計法有關會計憑證之規定，下列敘述何者錯誤？",opts:["商業會計憑證分為原始憑證與記帳憑證", "原始憑證是專指因發生商業活動由商業本身給予外人的證明", "商業會計之處理記帳憑證為記帳所根據之憑證", "商業會計事務較簡單者得不編製記帳憑證"],ans:1,exp:"依商業會計法第15、16條，原始憑證包括外來憑證、對外憑證及內部憑證，並非「專指由商業本身給予外人的證明」，故B敘述錯誤。"},
  {id:149,yr:111,cat:"商業會計法",q:"依商業會計處理準則，下列哪一種資產於減損後，當有證據顯示以前期間所認列之減損損失可能已不存在或減少時，資產帳面金額仍不予迴轉？",opts:["採權益法之投資", "以成本衡量之權益工具投資", "以攤銷後成本衡量之債務工具投資", "無活絡市場之債務工具投資"],ans:1,exp:"依商業會計處理準則，以成本衡量之權益工具投資（如無活絡市場且公允價值無法可靠衡量者）之減損損失不得迴轉。"},
  {id:150,yr:112,cat:"公司法",q:"A公司因下列何種原因解散時，應行清算？",opts:["與他公司合併", "分割", "破產", "法院命令解散"],ans:3,exp:"依公司法第24條，公司解散除因合併、分割或破產而解散者外，應行清算。法院命令解散者須行清算。"},
  {id:151,yr:112,cat:"公司法",q:"有關股份有限公司董事及董事會之敘述，下列何者錯誤？",opts:["公開發行股票公司之董事不得少於5人", "非公開發行之非閉鎖性非1人公司之董事依章程不得少於3人", "非公開發行之非閉鎖性1人公司得依章程不設董事會僅置董事1人", "閉鎖性公司得依章程不設董事會僅置董事1人"],ans:0,exp:"依證券交易法第26條之3，公開發行公司董事不得少於「五人」係指上市櫃；惟公司法第192條規定董事最低為三人。本題官方答案為B係配置「錯誤」選項，作答請對照當年度標準答案。（官方答案B）"},
  {id:152,yr:112,cat:"公司法",q:"下列有關股份有限公司發行新股之敘述，何者正確？",opts:["以公積抵充核發新股予原股東時除專案核定外應保留10%至15%由員工承購", "得發行限制員工權利新股者以公開發行公司為限", "公開發行公司限制員工權利新股之發行事項由經濟部定之", "章程得訂明發行限制員工權利新股之對象包括符合一定條件之控制或從屬公司員工"],ans:3,exp:"依公司法第267條，章程得訂明限制員工權利新股之對象，包括符合一定條件之控制或從屬公司員工。以公積抵充配股無須保留員工承購；限制員工權利新股非以公開發行為限。"},
  {id:153,yr:112,cat:"公司法",q:"A為非公開發行公司擬召開董事會討論投資東南亞事宜。依公司法下列敘述何者錯誤？",opts:["過半數董事得書面記明提議事項及理由請求董事長召集，請求後15日內董事長不召開時過半數董事得自行召集", "董事會召集除章程有較高規定外應於3日前通知各董事及監察人", "章程得訂明經全體董事同意董事就當次議案以書面行使表決權而不實際集會", "董事居住國外者得以書面委託居住國內之其他股東並向主管機關登記後經常代理出席董事會"],ans:3,exp:"依公司法第205條，董事委託代理出席董事會應委託「其他董事」，非「其他股東」，故D敘述錯誤。"},
  {id:154,yr:112,cat:"公司法",q:"A公司有三名董事，董事長甲（無代表法人）、董事乙（代表B公司）、董事（代表C公司）。下列何者為A公司之法人董事？",opts:["甲", "乙", "B股份有限公司", "C股份有限公司"],ans:3,exp:"本題官方答案為D。法人董事係指法人本身當選為董事之情形。序號003之董事欄位為C公司直接當選，故C股份有限公司為法人董事。"},
  {id:155,yr:112,cat:"公司法",q:"甲擬與同學8人共同設立A有限公司，下列關於A公司之敘述何者錯誤？",opts:["A公司最少置董事3人", "董事應經股東表決權三分之二以上同意就有行為能力股東中選任", "除非有特約否則董事不得向公司請求報酬", "若甲被選為董事不得無故辭任亦不得無故使其退職"],ans:0,exp:"依公司法第108條，有限公司置董事一人至數人，並無「最少3人」之規定，故A敘述錯誤。"},
  {id:156,yr:112,cat:"公司法",q:"下列何者係公司法第129條所定股份有限公司章程絕對必要記載事項？",opts:["分公司之設立", "特別股之種類及其權利義務", "解散之事由", "訂立章程之年、月、日"],ans:3,exp:"依公司法第129條，章程絕對必要記載事項包括公司名稱、所營事業、股份總數及每股金額、本公司所在地、訂立章程之年月日等。「訂立章程之年月日」為絕對必要記載事項。"},
  {id:157,yr:112,cat:"公司法",q:"有關本國公司之申請外文名稱登記及變更登記的敘述，下列何者正確？",opts:["公司應向主管機關申請外文名稱登記後始可於章程記載", "外文名稱登記後如與登記在先之他出進口廠商外文名稱相同主管機關應依職權主動令限期變更", "外文名稱與政府機關公益團體相同者主管機關不得令限期變更", "向主管機關申請外文名稱登記時得使用之外文種類以經濟部定頒者為限"],ans:3,exp:"依公司法及外文名稱登記辦法，得使用之外文種類以經濟部定頒者為限，故D正確。"},
  {id:158,yr:112,cat:"公司法",q:"非公開發行之A公司設二席監察人甲、乙。董事丙因違反章程情節重大，甲擬召集股東會決議解任，乙不同意。下列敘述何者正確？",opts:["甲無法合法召集因乙不同意", "甲可合法召集因無需得乙同意", "甲無法合法召集因非其職權範圍", "甲可合法召集因公司法就監察人召集權並無限制規定"],ans:1,exp:"依公司法第220條，監察人得各自行使監察權及召集股東會，無須其他監察人同意。故甲可單獨合法召集，B正確。"},
  {id:159,yr:112,cat:"公司法",q:"A公司擬發行公司債以清償債務，下列敘述何者正確？",opts:["應由二分之一以上董事出席及出席董事過半數同意行之", "近3年縱有虧損亦可發行無擔保公司債", "若為公開發行公司其發行有擔保公司債總額不得逾全部資產減全部負債後之餘額", "發行公司債時得約定其受償順序優先於公司其他債權"],ans:2,exp:"依公司法第247條，公開發行公司發行有擔保公司債之總額，不得逾全部資產減去全部負債後之餘額。本題官方答案為C。"},
  {id:160,yr:112,cat:"公司法",q:"A公司與B公司具表決權股東均相同且均為閉鎖性公司，分別持有C公開發行公司28%及24%股份，C持有D非公開發行公司55%股份。關於編製關係企業三書表之義務，下列敘述何者正確？",opts:["因A、B為閉鎖性公司故C無須編製A、B、C三家關係企業合併營業報告書", "C應造具與A及B間之關係報告書", "C應編製C及A、B、D三家公司之關係企業合併財務報表", "C應造具編製與D公司間之關係報告書及關係企業合併營業報告書"],ans:1,exp:"本題官方答案為B。依公司法第369條之12，從屬公司應造具其與控制公司間之關係報告書。A、B合計持有C超過50%構成控制，C為從屬公司，應造具與A、B間之關係報告書。"},
  {id:161,yr:112,cat:"公司法",q:"下列何者非股份回籠禁止之例外情形？",opts:["特別股回收", "員工庫藏股", "反對股東行使股份收買請求權", "被持有已發行有表決權股份總數過半數之從屬公司取得控制公司之股份"],ans:1,exp:"本題官方答案為B。股份回籠禁止之例外包括特別股收回、反對股東股份收買請求權等；從屬公司不得取得控制公司股份。員工庫藏股之配置於本題為「非例外」之選項，作答請對照標準答案B。"},
  {id:162,yr:112,cat:"證券交易法",q:"依證券交易法之規定，公司制之證券交易所若欲聘任經理人，下列何者依法不能擔任？",opts:["上市公司之股東", "證券商之股東", "上櫃公司之股東", "非公開發行股票公司之股東"],ans:0,exp:"本題官方答案為A。依證券交易法第126、127條，證券交易所之董監事、經理人有兼充限制，以維持市場中立。上市公司股東之兼充限制為本題答案配置，作答請對照標準答案A。"},
  {id:163,yr:112,cat:"證券交易法",q:"A證券商因業務員下單操作失誤造成客戶甲損失，甲起訴A證券商賠償。基於下列何種理由A證券商能請求法院不經實體審查而駁回甲之訴訟？",opts:["A證券商與甲有仲裁約定", "A證券商與甲有擔保合意", "A證券商之業務員操作並無過失", "甲無法證明其損失數額"],ans:0,exp:"依證券交易法第166條，證券商與客戶間因有價證券交易所生爭議得依約定進行仲裁。有仲裁約定者，法院得不經實體審查駁回起訴。"},
  {id:164,yr:112,cat:"證券交易法",q:"甲擬徵求A公開發行公司出席股東會之委託書，下列有關委託書之敘述何者錯誤？",opts:["甲除代為發放股東紀念品或合理費用外不得以給付金錢或利益價購為條件", "股東乙臨時找不到公司印發之委託書而自行用信紙寫委託書，該委託書屬違法", "甲持未遵守法令之徵求委託書出席股東會行使表決權，該次股東會決議因此無效", "股東甲應於股東常會開會38日前檢附委託書徵求資料表等文件送達公司"],ans:1,exp:"股東自行書寫之委託書（非徵求）仍屬有效，僅徵求委託書須符合規範。故B「自行用信紙寫委託書屬違法」之敘述錯誤。本題官方答案為A係配置「錯誤」選項位置，作答請對照標準答案。（官方答案A）"},
  {id:165,yr:112,cat:"證券交易法",q:"A上市公司董事甲因私人因素擬轉讓持股，關於持股轉讓限制方式下列敘述何者錯誤？",opts:["得於向主管機關申報之日起3日後向符合條件之特定人為之", "於集中交易市場每日交易不超過10張者得豁免轉讓方式限制", "得經主管機關核准或自申報生效日後向非特定人為之", "得依主管機關所定持有期間及每日得轉讓數量比例於申報之日起3日後於集中市場或證券商營業處所為之"],ans:0,exp:"本題官方答案為A。依證券交易法第22條之2，向特定人轉讓係於申報之日起「3日內」為之，非「3日後」，故A敘述錯誤。"},
  {id:166,yr:112,cat:"證券交易法",q:"甲為上市公司A之董事長，A準備募集股票，甲對公開說明書主要內容不實之民事責任認知何者錯誤？",opts:["甲自己應負無過失責任", "A公司應負無過失責任", "該股票承銷商得主張已盡相當注意並有正當理由相信無虛偽而免責", "在公開說明書上簽章的職員得主張已盡相當注意並有正當理由相信無虛偽而免責"],ans:0,exp:"依證券交易法第32條，發行人（A公司）負無過失責任，但負責人、職員、承銷商等得舉證已盡相當注意而免責，並非絕對無過失責任。故甲「應負無過失責任」之認知錯誤。"},
  {id:167,yr:112,cat:"證券交易法",q:"A上市公司辦理現金發行新股，保留法定比例予員工後再經董事會決議提撥15%對外公開發行，剩餘由原股東認購且全數認購。A公司發行新股程序存在何種錯誤？",opts:["現金發行新股適用股權分散之規定", "員工須於股權分散後始可行使新股認購權", "董事會無權將股權分散比例定為15%", "股東之認購權不應優先於股權分散"],ans:2,exp:"本題官方答案為C。依證券交易法第28條之1，股權分散之提撥比例由主管機關規定，董事會無權自行將比例定為15%，故存在此錯誤。"},
  {id:168,yr:112,cat:"證券交易法",q:"依現行證交法，公開發行公司獨立董事甲若於任期中與該公司非獨立董事乙結婚，下列敘述何者正確？",opts:["獨立董事甲不得與同公司非獨立董事乙結婚", "獨立董事甲於結婚後應視為非獨立董事", "獨立董事甲結婚後恐喪失董事資格", "獨立董事甲應經股東會決議轉任為非獨立董事"],ans:2,exp:"本題官方答案為C。依證券交易法第14條之2及獨立董事獨立性規範，獨立董事與其他董事有配偶關係將喪失獨立性，恐喪失獨立董事資格。"},
  {id:169,yr:112,cat:"證券交易法",q:"A上市公司董事甲今年1月中旬買進A公司股票，3月下旬賣出，獲利100萬元。董事會不行使歸入權，股東乙依法請求董事會行使。依證交法A公司董事會於乙請求後幾日內不行使時，乙得為公司行使歸入權？",opts:["10日", "15日", "30日", "60日"],ans:2,exp:"依證券交易法第157條，股東請求董事會行使歸入權，董事會於30日內不行使時，請求之股東得為公司行使歸入權。"},
  {id:170,yr:112,cat:"證券交易法",q:"甲剛擔任A上櫃公司董事，依證交法第157條之1規定下列敘述何者正確？",opts:["知悉重大影響支付本息能力之消息在未公開前買進A公司普通公司債不構成內線交易", "知悉重大影響支付本息能力之消息在未公開前賣出A公司普通公司債不構成內線交易", "甲辭去董事後就不是內線交易規範對象", "知悉內線消息在消息公開後立刻買賣A公司股票不構成內線交易"],ans:3,exp:"依證券交易法第157條之1，內線交易禁止係於消息「公開前或公開後一定沉澱時間內」交易。消息公開後立即交易仍可能受沉澱期限制，但本題官方答案為D，係指消息公開後（經沉澱）買賣不構成內線交易，作答請對照題意與標準答案。"},
  {id:171,yr:112,cat:"證券交易法",q:"關於公開發行公司年度財務報告，合併財報應重行編製之標準下列敘述何者正確？",opts:["更正綜合損益金額在1千萬元以上且達原決算營業收入淨額1%", "更正綜合損益金額在1千5百萬元以上且達原決算營業收入淨額1.5%", "更正資產負債表個別項目（不含重分類）金額在1千5百萬元以上且達原決算總資產1.5%", "更正資產負債表個別項目（不含重分類）金額在1千萬元以上且達原決算總資產1%"],ans:2,exp:"本題官方答案為C。依證券發行人財務報告編製準則，合併財報重編標準涉及更正金額及占比之雙重門檻，作答請對照當年度標準答案C。"},
  {id:172,yr:112,cat:"商業會計法",q:"依商業會計法，使用電子方式處理會計資料之商業，會讓會計人員被處5年以下有期徒刑、拘役或科或併科60萬元以下罰金之情事，主要係因下列那些事項？①故意輸入不實資料 ②故意塗改貯存體之會計資料使財務報表不實 ③故意遺漏會計事項不為登錄使財務報表不實 ④其他利用不正當方法使會計事項不實",opts:["①②③④", "僅①②④", "僅②③④", "僅③④"],ans:3,exp:"本題官方答案為D（僅③④）。依商業會計法第71、72條，使用電子方式處理會計資料而故意遺漏會計事項不為登錄、或利用不正當方法致會計事項不實者，處刑事罰，作答請對照當年度標準答案。"},
  {id:173,yr:112,cat:"商業會計法",q:"商業之決算報表應如何處理？",opts:["商業負責人及主辦會計人員簽名或蓋章負責", "商業負責人、經理人、主辦及經辦會計人員簽名或蓋章負責", "代表商業之負責人、經理人及主辦會計人員簽名或蓋章負責", "商業負責人、經理人及主辦會計人員簽名或蓋章負責"],ans:3,exp:"本題官方答案為D。依商業會計法第66條，決算報表應由商業負責人、經理人及主辦會計人員簽名或蓋章負責。"},
  {id:174,yr:112,cat:"商業會計法",q:"依商業會計法及商業會計處理準則之規定，下列敘述何者錯誤？",opts:["原始憑證係用以證明會計事項之經過而為造具記帳憑證所根據之憑證", "記帳憑證可由代表商業負責人授權經理人、主辦或經辦會計人員簽名或蓋章", "會計憑證分為原始憑證及記帳憑證", "經濟部對於記帳憑證之名稱及格式並無規定"],ans:3,exp:"本題官方答案為D。依商業會計處理準則，記帳憑證之名稱及格式由商業自行訂定，經濟部對此並無強制規定之敘述應為「正確」；本題答案配置D為「錯誤」選項，作答請對照標準答案D。"},
  {id:175,yr:113,cat:"公司法",q:"下列何種股東會決議事項，得適用公司法第175條假決議規定？",opts:["董事報酬之決定", "監察人之選任", "將應分派股息及紅利之全部或一部以發行新股方式為之", "簽訂與他人經常共同經營之契約"],ans:0,exp:"本題官方答案為A。依公司法第175條，假決議適用於普通決議事項。董事報酬之決定屬普通決議事項，得適用假決議；監察人選任、發行新股配股、共同經營契約等屬特別決議或不適用假決議。"},
  {id:176,yr:113,cat:"公司法",q:"對於有重建更生可能並符合法定要件之公司欲進行重整時，下列何人有聲請重整之權？",opts:["繼續1年以上持有已發行股份總數10%以上股份之股東", "相當於公司負債總額10%以上之公司債權人", "同業公會", "公司三分之二以上之受僱員工"],ans:3,exp:"本題官方答案為D。依公司法第282條，得聲請重整者包括公司、繼續六個月以上持股10%以上之股東、相當於公司已發行股份總數金額10%以上之公司債權人、工會、公司三分之二以上之受僱員工。"},
  {id:177,yr:113,cat:"公司法",q:"A為從事營造之非公開發行公司，發行100萬股每股10元。依公司法下列敘述何者錯誤？",opts:["得經股東會特別決議將已發行票面金額股全數轉換為無票面金額股", "得依章程記載發行對特定事項具否決權特別股", "若依章程發行複數表決權特別股則持複數表決權股東於監察人選舉與普通股股東表決權同", "不得發行當選一定名額董事權利之特別股"],ans:2,exp:"本題官方答案為C。依公司法第157條，複數表決權特別股股東於「監察人」選舉時，其表決權與普通股相同係正確規定；本題C配置為「錯誤」選項，作答請對照標準答案C與條文細節。"},
  {id:178,yr:113,cat:"公司法",q:"甲投資A有限公司並擔任董事，因與其他股東意見不合擬將出資轉讓，應採何方式？",opts:["依出資轉讓自由原則甲得自行尋找受讓人轉讓", "其他股東表決權過半數同意始得轉讓他人", "其他股東表決權三分之二以上同意始得轉讓他人", "甲之出資不得自由轉讓僅得轉讓予其他股東"],ans:2,exp:"依公司法第111條，有限公司董事（執行業務股東）非得其他股東表決權三分之二以上之同意，不得以其出資之全部或一部轉讓於他人。"},
  {id:179,yr:113,cat:"公司法",q:"針對我國公司法中關於企業社會責任，下列敘述何者錯誤？",opts:["公司係以營利為目的之社團法人", "公司經營業務得採行增進公共利益之行為", "公司得對他人為贈與行為", "兼具營利與公益目的之企業目前尚不可採取公司之組織型態經營"],ans:3,exp:"依公司法第1條，公司得採行增進公共利益之行為以善盡社會責任；兼益公司（如社會企業）得以公司組織型態經營，故D「尚不可採取公司組織型態」之敘述錯誤。"},
  {id:180,yr:113,cat:"公司法",q:"A公司前二大股東B、C公司分別持有A公司9%與8%股份，B、C已發行股份全數為D公司持有。A公司應向資訊平臺申報以下何人之姓名名稱及持股數？",opts:["B公司", "D公司", "持有D公司股份51%之自然人甲", "A公司之經理人乙"],ans:3,exp:"本題官方答案為D。依公司法第22條之1，公司應申報董事、監察人、經理人及持股超過10%股東之資料。經理人乙屬應申報對象，作答請對照標準答案D與當年度條文。"},
  {id:181,yr:113,cat:"公司法",q:"非屬公營事業之股份有限公司發行新股，下列敘述何者正確？",opts:["股東之新股認購權不得與原有股份分離而獨立轉讓", "公司發行特別股時員工無優先認購權", "公司發行新股應保留一定比例予員工認購，但經目的事業主管機關專案核定者不在此限", "特別股股東於公司發行新股時無股東優先認購權"],ans:2,exp:"依公司法第267條，公司發行新股應保留發行新股總數10%至15%由員工承購，但經目的事業中央主管機關專案核定者不在此限。故C正確。"},
  {id:182,yr:113,cat:"公司法",q:"某小規模公司負責人無暇親辦公司登記欲委任代理人，依公司法下列何者得為代理人？",opts:["律師、代書", "代書、記帳士", "記帳士、會計師", "律師、會計師"],ans:3,exp:"本題官方答案為D。依公司法第387條及委任代理相關規定，得受委任辦理公司登記之專業代理人包括律師、會計師。"},
  {id:183,yr:113,cat:"公司法",q:"非公開發行之A公司，董事會委任董事長甲之長子乙為總經理、次女丙為財務經理。今年股東會中小股東提臨時動議改選總經理並決議選任丁擔任總經理。此改選案效力如何？",opts:["有效", "得撤銷", "無效", "須經原總經理承認始生效力"],ans:2,exp:"依公司法第29條，總經理之委任、解任屬董事會職權，非股東會職權。股東會以臨時動議改選總經理逾越其法定權限，該決議因內容違法而無效。"},
  {id:184,yr:113,cat:"公司法",q:"股份有限公司股票之發行，下列敘述何者正確？",opts:["非公開發行公司實收資本額達5億元以上者應發行股票", "公開發行股票公司有發行股票之義務", "有發行股票義務之公司應在設立登記或發行新股變更登記後6個月內發行股票", "無發行股票義務之公司其股票之發行應經主管機關核准後始得為之"],ans:1,exp:"本題官方答案為B。依公司法第161條之1，公開發行股票之公司有發行股票之義務，應於設立登記或發行新股變更登記後三個月內發行；非公開發行公司得不發行股票。"},
  {id:185,yr:113,cat:"公司法",q:"甲為A食品公司董事，經好友乙請託擔任B食品公司董事，下列何種作為符合公司法規定？",opts:["甲僅需取得股東會許可無須向股東說明擔任B公司行為之重要內容", "A公司股東會許可甲兼職之決議應有代表已發行股份總數二分之一以上股東出席以出席表決權過半數同意", "若甲未取得股東會同意便出任B公司董事，A公司股東會得以二分之一以上股東出席過半數同意決議將甲擔任B公司董事之所得視為A公司所得", "前項經股東會決議請求歸入甲兼職所得限於決議前二年之所得"],ans:2,exp:"依公司法第209條，董事為競業行為應對股東會說明並取得許可（特別決議）；違反時公司得以股東會決議行使歸入權，將其所得視為公司所得，惟須注意決議門檻。本題官方答案為C。"},
  {id:186,yr:113,cat:"公司法",q:"A公司係依我國公司法成立之股份有限公司擬登記英文名稱，依現行公司法關於外文名稱之規定下列敘述何者正確？",opts:["A公司申請英文名稱登記前仍應向經濟部申請預查並取得核准", "A公司之英文名稱於完成登記前不得對外使用", "欲申請英文名稱登記A公司應於章程中記載公司英文名稱", "A公司英文名稱登記後如與公益團體之英文名稱相同經濟部得逕予廢止英文名稱登記"],ans:0,exp:"本題官方答案為A。依公司法及外文名稱登記辦法，申請公司外文名稱登記前應先申請預查並取得核准。"},
  {id:187,yr:113,cat:"證券交易法",q:"投資人甲透過A證券經紀商下單買入B上市公司股票，經證交所撮合後與委託C證券經紀商賣出之乙成交。下列敘述何者正確？",opts:["買賣契約成立於A與C之間", "買賣契約成立於甲與乙之間", "買賣契約成立於甲與C之間", "買賣契約成立於乙與A之間"],ans:2,exp:"本題官方答案為C。集中交易市場採行紀制度，證券經紀商以行紀名義為客戶買賣，買賣契約成立於下單客戶與對方證券商之間。作答請對照當年度標準答案C與行紀法理。"},
  {id:188,yr:113,cat:"證券交易法",q:"關於證券交易法之私募規定，下列敘述何者錯誤？",opts:["私募股票購買人之子女得因繼承取得該股票", "私募之應募人得自有價證券交付日起滿3年後自由轉讓", "公司債私募之應募人或購買人倘違反轉售限制僅須受行政罰", "關於私募股票之轉售限制應於股票上以明顯文字註記並於交付之相關書面文件中載明"],ans:2,exp:"本題官方答案為C。依證券交易法第43條之8，違反私募有價證券轉售限制者，除行政責任外尚可能涉及刑事責任，故C「僅須受行政罰」之敘述錯誤。"},
  {id:189,yr:113,cat:"證券交易法",q:"證券交易法有關私募有價證券之規定，下列敘述何者正確？",opts:["公開發行公司私募普通公司債須經股東會特別決議始得為之", "公開發行公司私募新股僅須董事會特別決議即可", "公開發行公司私募普通公司債之總額不得逾全部資產減全部負債餘額之400%", "公開發行公司私募有價證券應募人只要符合資格其人數並無限制"],ans:1,exp:"本題官方答案為B。依證券交易法第43條之6，公開發行公司私募普通公司債得經董事會決議，私募新股則須股東會特別決議；本題答案配置為B，作答請對照標準答案與條文。"},
  {id:190,yr:113,cat:"證券交易法",q:"關於證券交易法就外國公司之規定，下列敘述何者正確？",opts:["外國公司應在我國境內指定其依證交法之訴訟及非訴訟代理人各一人", "外國公司指定之代理人應在我國境內有住所或居所", "外國公司指定之代理人應經主管機關核准", "已依證交法辦理之外國公司如於我國境內設立分公司或營業無須再依公司法辦理"],ans:2,exp:"本題官方答案為C。依證券交易法第4條及外國公司相關規定，外國公司於我國募集發行有價證券者，其在我國境內代理人之指定須符合法定程序，作答請對照標準答案C。"},
  {id:191,yr:113,cat:"證券交易法",q:"依證交法，公開發行公司最遲應於每會計年度第一、二、三季終了後幾日內公告並申報經會計師核閱及提報董事會之財務報告？",opts:["15日內", "1個月內", "45日內", "2個月內"],ans:2,exp:"依證券交易法第36條，公開發行公司應於每會計年度第一季、第二季及第三季終了後45日內，公告並申報經會計師核閱及提報董事會之財務報告。"},
  {id:192,yr:113,cat:"證券交易法",q:"依證交法第36條公告申報之合併財報，下列何種情形應重編財報並重行公告？",opts:["更正資產負債表個別項目（不含重分類，下略）金額在3千萬元以上", "更正資產負債表個別項目金額在1千萬元以上", "更正資產負債表個別項目金額在3千萬元以上且達原決算總資產金額3%", "更正資產負債表個別項目金額在1千萬元以上且達原決算總資產金額1%"],ans:3,exp:"本題官方答案為D。依證券發行人財務報告編製準則，更正資產負債表個別項目金額達一定門檻且達原決算總資產一定比例者，應重編並重行公告，作答請對照標準答案D。"},
  {id:193,yr:113,cat:"證券交易法",q:"依證交法，A公開發行公司之董事、監察人或經理人意圖為自己或第三人利益而為違背職務之行為或侵占公司資產，致A公司遭受損害達新臺幣多少金額者，處3年以上10年以下有期徒刑得併科1千萬元以上2億元以下罰金？",opts:["1百萬元", "2百萬元", "3百萬元", "5百萬元"],ans:3,exp:"依證券交易法第171條，公司董事、監察人或經理人意圖為自己或第三人利益而為違背職務之行為或侵占公司資產，致公司遭受損害達新臺幣500萬元以上者，處3年以上10年以下有期徒刑。"},
  {id:194,yr:113,cat:"證券交易法",q:"會計師甲為客戶A上市公司辦理財報查核簽證，因過失未發現重大疏漏，主管機關擬處分。主管機關之處分手段不包括下列何者？",opts:["對甲為警告", "停止甲辦理簽證業務2年", "勒令甲服務之事務所停業6個月", "撤銷對甲簽證之核准"],ans:2,exp:"本題官方答案為C。依會計師法及證券交易法，主管機關對會計師之處分包括警告、停止簽證業務、撤銷簽證核准等，但無「勒令事務所停業」之處分手段，故C非屬之。"},
  {id:195,yr:113,cat:"證券交易法",q:"A為從事通訊傳播之上市公司。甲為拉抬A公司股價與乙約定，在甲出售A公司股票時乙同時為購買行為，則甲乙之行為可能構成下列何種操縱行為？",opts:["沖洗買賣", "違約不交割", "相對委託", "短線交易"],ans:2,exp:"依證券交易法第155條，甲乙約定一方賣出、他方同時買進相同證券，意圖造成交易活絡假象或影響價格者，構成「相對委託」之操縱行為。"},
  {id:196,yr:113,cat:"證券交易法",q:"甲為A公開發行公司董事，利用職務之便使A公司為不合營業常規且不利益之交易致重大損害。依證交法下列敘述何者錯誤？",opts:["甲可處3年以上10年以下有期徒刑得併科1千萬元以上2億元以下罰金", "若犯罪獲取財物或利益達1億元以上者處7年以上有期徒刑得併科2千5百萬元以上5億元以下罰金", "若係無償行為A公司得聲請法院撤銷", "若係有償行為受益人於受益時不知情事者A公司亦得聲請法院撤銷"],ans:3,exp:"本題官方答案為D。依民法撤銷權法理及證交法規定，有償行為之撤銷須受益人於受益時「知其情事」始得撤銷；受益人善意（不知情）者不得撤銷，故D敘述錯誤。"},
  {id:197,yr:113,cat:"商業會計法",q:"依商業會計法，關於公司組織主辦會計之任免，下列敘述何者正確？",opts:["若為股份有限公司應由股東會以股東過半數出席及出席過半數同意", "若為有限公司應有全體股東過半數之同意", "若為無限公司應有全體股東之同意", "若為兩合公司應有全體無限責任股東之同意"],ans:1,exp:"依商業會計法第5條，公司主辦會計之任免：股份有限公司應由董事會以董事過半數出席及出席過半數同意；有限公司須有全體股東過半數同意；無限公司、兩合公司須全體無限責任股東過半數同意。故B正確。"},
  {id:198,yr:113,cat:"商業會計法",q:"依商業會計處理準則，下列那些會計項目可能同時出現於短期性及長期性投資？①避險之金融資產 ②按攤銷後成本衡量之金融資產 ③採用權益法之投資 ④透過損益按公允價值衡量之金融資產 ⑤以成本衡量之金融資產",opts:["僅③④⑤", "僅①②④", "僅①②⑤", "僅①②④⑤"],ans:3,exp:"本題官方答案為D（僅①②④⑤）。避險之金融資產、按攤銷後成本衡量之金融資產、透過損益按公允價值衡量之金融資產、以成本衡量之金融資產，依其到期或持有意圖可能同時出現於流動及非流動項目；採權益法之投資則僅列非流動。"},
  {id:199,yr:113,cat:"商業會計法",q:"商業編製之財務報表有不實而構成刑事犯罪，下列何人於事前曾表示拒絕或更正者得減輕或免除其刑？①商業負責人 ②主辦會計人員 ③經辦會計人員",opts:["僅①②", "僅①③", "僅②③", "①②③"],ans:2,exp:"依商業會計法第71條但書，主辦及經辦會計人員於事前曾表示拒絕或更正而未被採納者，得減輕或免除其刑。商業負責人不在此減免之列，故為②③。"},
  {id:200,yr:110,cat:"商業會計法",q:"依商業會計法及商業會計處理準則，關於會計憑證保存之規定，下列敘述何者正確？",opts:["各項會計憑證除應永久保存或有關未結會計事項者外，應於年度決算程序辦理終了後至少保存5年","記帳憑證保管期限屆滿後經經辦人員核准即得銷毀","會計帳簿及財務報表應永久保存","原始憑證一律不得作為記帳憑證"],ans:0,exp:"依商業會計法第38條，各項會計憑證除應永久保存或有關未結會計事項者外，應於年度決算程序辦理終了後至少保存5年；會計帳簿及財務報表應保存10年。"},
];

const ESSAYS = [
  {id:'申論一',cat:'公司法',q:'乙持有A公司5%股份，認為丙、丁、戊、己等四位董事違反善良管理人之注意義務，得否直接以自己名義代位A公司提起訴訟，請求四位董事賠償A公司之損害？（10分）',
   ans:`【法條依據】公司法第214條\n\n【答題要點】\n一、依公司法第214條，繼續六個月以上，持有已發行股份總數1%以上之股東，得以書面請求監察人為公司對董事提起訴訟。\n\n二、程序要件：股東須先以書面請求監察人提訴，監察人自受請求之日起30日內不提起訴訟，股東方得自行提起訴訟。\n\n三、本題分析：乙持有5%股份，符合1%門檻；A公司為非公開發行公司。若乙已踐行書面請求程序，且監察人30日內未提訴，乙得以自己名義代位提起訴訟。\n\n四、若乙未踐行前述程序，直接提訴則不符程序要件。`},
  {id:'申論二',cat:'證券交易法',q:'A股份有限公司公開說明書中虛增應收帳款1億元，A公司、甲（董事長）、乙（職員）、丙（會計師）及丁（承銷商），依證券交易法應否對善意投資人戊負損害賠償責任？（20分）',
   ans:`【法條依據】證券交易法第32條\n\n【各人責任分析】\n一、A公司（發行人）：應負賠償責任。得以相當注意並有正當理由確信其真實者免責，但本案顯難免責。\n\n二、甲（董事長）：指示虛增，為主要行為人，負賠償責任，不得主張免責。\n\n三、乙（職員）：執行虛增行為，負賠償責任。\n\n四、丙（會計師）：因信賴過去往來即予簽證，未盡查核義務。依第32條第1項第4款，會計師應負賠償責任，但能證明已盡相當注意者得免責（本案難以免責）。\n\n五、丁（承銷商）：依第32條第1項第5款，承銷商應負賠償責任，但能證明已盡相當注意且有正當理由確信其真實者得免責。\n\n【損害計算】戊以每股25元認購10,000股，目前10元，差額每股15元，損害賠償為150,000元（最高，實際依法院認定）。`},
  {id:'申論三',cat:'商業會計法',q:'依商業會計法規定，決算報表應由何人簽名或蓋章？若違反此規定者，有何處罰規定？（10分）',
   ans:`【法條依據】商業會計法第66條、第71條\n\n【一、應簽名或蓋章之人員】\n依商業會計法第66條，決算報表應由下列人員簽名或蓋章：\n1. 負責人\n2. 經理人\n3. 主辦會計人員\n三者均須簽名或蓋章，缺一不可。\n\n【二、罰則】\n依商業會計法第71條：\n1. 行政罰：違反者，各處新臺幣六萬元以下罰鍰。\n2. 刑事罰：若涉及使財務報表發生不實之結果，負責人、主辦及經辦會計人員可處五年以下有期徒刑、拘役或科或併科新臺幣六十萬元以下罰金。`}
];

const WRONG_KEY='cpa_wrong_ids_v1';
const THEME_KEY='cpa_theme';

function applyTheme(t){
  if(t==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('theme-btn').textContent='☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-btn').textContent='🌙';
  }
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';
  const next=cur==='dark'?'light':'dark';
  applyTheme(next);
  try{localStorage.setItem(THEME_KEY,next);}catch(e){}
}
function initTheme(){
  let t='light';
  try{t=localStorage.getItem(THEME_KEY)||'light';}catch(e){}
  applyTheme(t);
}

function loadWrongSet(){
  try{
    const raw=localStorage.getItem(WRONG_KEY);
    return raw?new Set(JSON.parse(raw)):new Set();
  }catch(e){return new Set();}
}
function saveWrongSet(){
  try{localStorage.setItem(WRONG_KEY,JSON.stringify([...wrongSet]));}catch(e){}
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let wrongSet=loadWrongSet();
let catFilter='all', yrFilter='all';
let questions=shuffle(ALL_QS),cur=0,answered=false,correct=0,wrong=0,done=false,mode='quiz',reviewing=false;

function refreshWrongCount(){
  document.getElementById('wrong-count').textContent=wrongSet.size;
}

function applyFilter(){
  reviewing=false;
  document.getElementById('wrong-btn').classList.remove('active');
  let base=ALL_QS;
  if(catFilter!=='all') base=base.filter(q=>q.cat===catFilter);
  if(yrFilter!=='all') base=base.filter(q=>String(q.yr)===yrFilter);
  questions=shuffle(base);
  cur=0;answered=false;correct=0;wrong=0;done=false;mode='quiz';
  updateStats();render();
}

function setCat(c,btn){
  catFilter=c;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function setYr(y,btn){
  yrFilter=y;
  document.querySelectorAll('.yr-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function reviewWrong(btn){
  if(wrongSet.size===0){return;}
  reviewing=true;
  document.querySelectorAll('.cat-btn,.yr-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  questions=shuffle(ALL_QS.filter(q=>wrongSet.has(q.id)));
  cur=0;answered=false;correct=0;wrong=0;done=false;mode='quiz';
  updateStats();render();
}

function updateStats(){
  document.getElementById('s-correct').textContent=correct;
  document.getElementById('s-wrong').textContent=wrong;
  const total=questions.length;
  const idx=Math.min(cur+1,total);
  document.getElementById('prog-text').textContent=done?'完成':idx+' / '+total;
  document.getElementById('prog-bar').style.width=(done?100:Math.round(idx/total*100))+'%';
}

function catClass(cat){
  if(cat==='證券交易法') return '證券';
  if(cat==='商業會計法') return '商業';
  return '';
}

function render(){
  const qa=document.getElementById('quiz-area');
  const ea=document.getElementById('essay-area');
  ea.innerHTML='';

  if(mode==='essay'){
    qa.innerHTML='';
    ea.innerHTML='<div class="section-label">申論題答題要點</div>'+
      ESSAYS.map(e=>`<div class="essay-card">
        <span class="tag ${catClass(e.cat)}">${e.id}・${e.cat}</span>
        <div class="essay-q">${e.q}</div>
        <button class="essay-toggle" onclick="toggleEssay('${e.id}')">展開答題要點 ▼</button>
        <div class="essay-ans" id="ea-${e.id}">${e.ans.replace(/\n/g,'<br>')}</div>
      </div>`).join('')+
      '<button class="back-btn" onclick="restart()">← 回到選擇題</button>';
    return;
  }

  if(done){
    const total=correct+wrong;
    const pct=total>0?Math.round(correct/total*100):0;
    const reviewMsg=reviewing
      ? (wrongSet.size===0?'<div class="done-pct" style="color:#0f6e56">錯題全部清空，太棒了！</div>':`<div class="done-pct">還剩 ${wrongSet.size} 題在錯題本</div>`)
      : `<div class="done-pct">答對率 ${pct}%</div>`;
    qa.innerHTML=`<div class="done-card">
      <div class="section-label">${reviewing?'錯題複習完成':'測驗完成'}</div>
      <div class="done-score">${correct}<span style="font-size:20px;color:#888">/${total}</span></div>
      ${reviewMsg}
      <div class="done-btns">
        <button class="primary" onclick="restart()">再來一輪（重新亂序）</button>
        ${wrongSet.size>0?'<button class="sec" onclick="reviewWrong(document.getElementById(\'wrong-btn\'))">複習錯題 ('+wrongSet.size+') →</button>':''}
        <button class="sec" onclick="goEssay()">練習申論題 →</button>
        <button class="sec" onclick="goFlash()">字卡練習 →</button>
      </div>
    </div>`;
    return;
  }

  if(questions.length===0){
    qa.innerHTML=`<div class="done-card">
      <div class="section-label">沒有題目</div>
      <div class="done-pct" style="margin-top:1rem">${reviewing?'錯題本是空的，先去做幾題吧！':'此分類暫無題目'}</div>
      <div class="done-btns" style="margin-top:1rem">
        <button class="primary" onclick="restart()">回到全部題目</button>
      </div>
    </div>`;
    updateStats();
    return;
  }

  const q=questions[cur];
  const optHtml=q.opts.map((o,i)=>`<button class="opt" id="opt-${i}" onclick="select(${i})">${['A','B','C','D'][i]}．${o}</button>`).join('');
  qa.innerHTML=`<div class="card">
    <span class="tag ${catClass(q.cat)}">${q.yr}年・${q.cat}</span>
    <div class="question">${q.q}</div>
    <div class="options">${optHtml}</div>
    <div class="exp" id="exp">${q.exp}</div>
  </div>
  <div class="nav">
    <button onclick="prev()" ${cur===0?'disabled':''}>← 上一題</button>
    <button class="primary" id="next-btn" onclick="next()" ${answered?'':'disabled'}>${cur===questions.length-1?'完成 ✓':'下一題 →'}</button>
  </div>`;
  updateStats();
}

function select(i){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>o.disabled=true);
  const exp=document.getElementById('exp');
  if(i===q.ans){
    opts[i].classList.add('ok');
    exp.classList.add('ok-exp');
    correct++;
    if(wrongSet.has(q.id)){wrongSet.delete(q.id);saveWrongSet();refreshWrongCount();}
  } else {
    opts[i].classList.add('ng');
    opts[q.ans].classList.add('show-ans');
    exp.classList.add('ng-exp');
    wrong++;
    if(!wrongSet.has(q.id)){wrongSet.add(q.id);saveWrongSet();refreshWrongCount();}
  }
  exp.classList.add('show');
  document.getElementById('next-btn').disabled=false;
  updateStats();
}

function next(){
  if(cur===questions.length-1){done=true;render();updateStats();return;}
  cur++;answered=false;render();
}

function prev(){
  if(cur>0){cur--;answered=false;render();}
}

function restart(){
  reviewing=false;mode='quiz';
  document.getElementById('wrong-btn').classList.remove('active');
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat===catFilter));
  document.querySelectorAll('.yr-btn').forEach(b=>b.classList.toggle('active', b.dataset.yr===yrFilter));
  applyFilter();
}

function goEssay(){mode='essay';render();}

function toggleEssay(id){
  const el=document.getElementById('ea-'+id);
  const btn=el.previousElementSibling;
  el.classList.toggle('show');
  btn.textContent=el.classList.contains('show')?'收起 ▲':'展開答題要點 ▼';
}

  document.querySelector('.stats').style.display='none';
  document.querySelectorAll('.filter-bar').forEach(el=>el.style.display='none');
  document.querySelector('.progress-bar-wrap').style.display='none';
  document.querySelector('.prog').style.display='none';
  fcFilter='全部';
  fcRender();
}

function exitFlash(){
  fcMode=false;
  document.getElementById('flash-area').innerHTML='';
  document.getElementById('flash-area').style.display='none';
  document.getElementById('quiz-area').style.display='';
  document.querySelector('.stats').style.display='';
  document.querySelectorAll('.filter-bar').forEach(el=>el.style.display='');
  document.querySelector('.progress-bar-wrap').style.display='';
  document.querySelector('.prog').style.display='';
  render();
}

function fcGetDeck(){
  if(fcFilter==='全部') return [...FLASHCARDS];
  return FLASHCARDS.filter(c=>c.type===fcFilter);
}

function fcShuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function fcStart(filter){
  fcFilter=filter;
  fcDeck=fcShuffle(fcGetDeck());
  fcCur=0;fcFlipped=false;fcOk=0;fcNg=0;
  fcRenderCard();
}

function fcRender(){
  const fa=document.getElementById('flash-area');
  const counts={全部:FLASHCARDS.length,數字:FLASHCARDS.filter(c=>c.type==='數字').length,比較:FLASHCARDS.filter(c=>c.type==='比較').length,考題:FLASHCARDS.filter(c=>c.type==='考題').length};
  fa.innerHTML=`
    <div class="fc-header">
      <button class="fc-back" onclick="exitFlash()">←</button>
      <div class="fc-title">字卡練習</div>
    </div>
    <div class="fc-entry" onclick="fcStart('全部')">
      <div class="fc-entry-left"><div class="fc-entry-name">全部混合</div><div class="fc-entry-desc">數字＋比較＋考題 共 ${counts['全部']} 張</div></div>
      <div class="fc-entry-arrow">›</div>
    </div>
    <div class="fc-entry" onclick="fcStart('數字')">
      <div class="fc-entry-left"><div class="fc-entry-name">⚡ 法條數字型</div><div class="fc-entry-desc">快速記住條號和關鍵數字 共 ${counts['數字']} 張</div></div>
      <div class="fc-entry-arrow">›</div>
    </div>
    <div class="fc-entry" onclick="fcStart('比較')">
      <div class="fc-entry-left"><div class="fc-entry-name">⚖️ 比較型</div><div class="fc-entry-desc">兩個概念對照記憶 共 ${counts['比較']} 張</div></div>
      <div class="fc-entry-arrow">›</div>
    </div>
    <div class="fc-entry" onclick="fcStart('考題')">
      <div class="fc-entry-left"><div class="fc-entry-name">📝 考題改編型</div><div class="fc-entry-desc">從真實試題提煉核心 共 ${counts['考題']} 張</div></div>
      <div class="fc-entry-arrow">›</div>
    </div>`;
}

function fcRenderCard(){
  const fa=document.getElementById('flash-area');
  if(fcCur>=fcDeck.length){
    fa.innerHTML=`
      <div class="fc-header">
        <button class="fc-back" onclick="fcRender()">←</button>
        <div class="fc-title">完成！</div>
      </div>
      <div class="fc-done">
        <div style="font-size:42px;font-weight:700;margin:0.5rem 0">${fcOk}<span style="font-size:20px;color:var(--muted)">/${fcDeck.length}</span></div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:1.5rem">記住了 ${Math.round(fcOk/fcDeck.length*100)}%</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button style="padding:14px;border-radius:12px;font-size:15px;font-weight:500;background:var(--accent);color:var(--accent-text);border:none;cursor:pointer;min-height:50px" onclick="fcStart(fcFilter)">再來一輪</button>
          <button style="padding:14px;border-radius:12px;font-size:15px;font-weight:500;background:var(--surface);color:var(--text);border:1px solid var(--line);cursor:pointer;min-height:50px" onclick="fcRender()">回選單</button>
        </div>
      </div>`;
    return;
  }
  const card=fcDeck[fcCur];
  const isCompare=card.type==='比較'&&card.compare&&fcFlipped;
  const compareHtml=isCompare?`<div class="fc-compare-grid">
    <div class="fc-compare-col"><div class="fc-compare-col-title">${card.compare.left.title}</div>${card.compare.left.text.replace(/\n/g,'<br>')}</div>
    <div class="fc-compare-col"><div class="fc-compare-col-title">${card.compare.right.title}</div>${card.compare.right.text.replace(/\n/g,'<br>')}</div>
  </div>`:'';
  fa.innerHTML=`
    <div class="fc-header">
      <button class="fc-back" onclick="fcRender()">←</button>
      <div class="fc-title">字卡練習</div>
    </div>
    <div class="fc-progress-bar-wrap"><div class="fc-progress-bar" style="width:${Math.round(fcCur/fcDeck.length*100)}%"></div></div>
    <div class="fc-prog">${fcCur+1} / ${fcDeck.length}</div>
    <div class="fc-card" onclick="fcFlip()" id="fc-main-card">
      <span class="fc-card-type ${card.type}">${card.type}型・${card.cat}${card.yr?' '+card.yr+'年':''}</span>
      <div class="fc-question">${card.q}</div>
      ${fcFlipped?`<div class="fc-answer">
        <div class="fc-answer-main">${card.a.replace(/\n/g,'<br>')}</div>
        ${compareHtml}
        <div class="fc-answer-exp">${card.exp}</div>
      </div>`:`<div class="fc-hint">點卡片看答案</div>`}
    </div>
    ${fcFlipped?`<div class="fc-btns">
      <button class="ng" onclick="fcRate(false)">不熟，再看</button>
      <button class="ok" onclick="fcRate(true)">記住了 ✓</button>
    </div>`:''}`;
}

function fcFlip(){
  if(fcFlipped)return;
  fcFlipped=true;
  fcRenderCard();
}

function fcRate(ok){
  if(ok)fcOk++;else fcNg++;
  fcCur++;fcFlipped=false;
  fcRenderCard();
}

initTheme();
refreshWrongCount();
render();
</script>
</body>
</html>
